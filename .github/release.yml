changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "Breaking changes"
      labels:
        - breaking-change
        - semver-major
    - title: "New features"
      labels:
        - enhancement
        - feature
        - semver-minor
    - title: "Bug fixes"
      labels:
        - bug
        - fix
    - title: "Documentation"
      labels:
        - documentation
    - title: "Dependencies"
      labels:
        - dependencies
    - title: "Other changes"
      labels:
        - "*"
